<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Events</title>

    <!-- Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!--- NAVBAR --->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #10069f;">
        <div class="container-fluid">

            <!-- Logo / App name -->
            <a class="navbar-brand" href="index.html">Campus Life Super App</a>

            <!-- Mobile toggle button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navigation Links -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="events.html">Events</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="dining.html">Dining</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="container mt-4">

        <!-- Page Title-->
        <h1>Campus Events</h1>
        <p>Discover upcoming events on campus and stay connected with the community.</p>

        <!-- Load Events Button -->
        <button id="loadEventsBtn" class="btn btn-primary mb-3">Load Events</button>

        <!-- Container for displaying events -->
        <div id="eventsContainer" class="row"></div>

        <!-- Search Section -->
        <div class="mb-4">
            <label for="eventSearch" class="form-label">Search Events</label>
            <input type="text" class="form-control" id="eventSearch" placeholder="Search for events">
        </div>

        <!-- Filter Section -->
        <div class="mb-4">
            <h3>Filter</h3>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="clubs">
                <label class="form-check-label" for="clubs">
                    Clubs
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="" id="sports">
                <label class="form-check-label" for="sports">
                    Sports
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="" id="academic">
                <label class="form-check-label" for="academic">
                    Academic
                </label>
            </div>

        </div>

        <!-- Event Cards -->
        <div class="row">

            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Event 1</h5>
                        <p class="card-text">Description of Event 1.</p>
                        <button class="btn btn-primary">More Info</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Event 2</h5>
                        <p class="card-text">Description of Event 2.</p>
                        <button class="btn btn-primary">More Info</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Event 3</h5>
                        <p class="card-text">Description of Event 3.</p>
                        <button class="btn btn-primary">More Info</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- connects javascript file -->
    <script src="js/script.js"></script>
</body>
</html>
